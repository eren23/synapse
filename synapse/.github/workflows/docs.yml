name: Deploy docs & web demos to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['docs/**', 'web/**', 'synapse-wasm/pkg/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install mdBook
        run: |
          mkdir -p "$HOME/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar xz -C "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Check public status sync
        run: python3 scripts/sync_public_status.py --check

      - name: Build book
        run: mdbook build docs/

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs/book/* _site/
          cp -r web/lewm-compress-demo _site/lewm-compress-demo
          cp -r web/ssm-demo _site/ssm-demo
          cp -r web/trajectories _site/trajectories 2>/dev/null || true
          cp web/index.html _site/demos.html 2>/dev/null || true
          if [ -d synapse-wasm/pkg ]; then
            mkdir -p _site/synapse-wasm-pkg
            cp -rL synapse-wasm/pkg/* _site/synapse-wasm-pkg/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
