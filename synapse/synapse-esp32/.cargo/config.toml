# ESP32-P4 build configuration (package level)
# Used when building: cargo +nightly build --target riscv32imafc-esp-espidf -Z build-std=std,panic_abort
# Host builds (cargo test -p synapse-esp32) ignore this.

[target.riscv32imafc-esp-espidf]
linker = "ldproxy"
# runner = "espflash flash --monitor"

[unstable]
build-std = ["std", "panic_abort"]

[env]
ESP_IDF_VERSION = "v5.3.2"
ESP_IDF_COMPILER = "clang"
ESP_IDF_SDKCONFIG_DEFAULTS = "sdkconfig.defaults"
