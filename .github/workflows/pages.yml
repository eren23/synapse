name: Deploy Synapse Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install mdBook
        run: |
          mkdir -p "$HOME/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar xz -C "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM package
        working-directory: synapse/synapse-wasm
        run: wasm-pack build --target web --release --out-dir pkg

      - name: Sync public status
        working-directory: synapse
        run: python3 scripts/sync_public_status.py

      - name: Build docs
        working-directory: synapse
        run: mdbook build docs/

      - name: Install Git LFS and pull binary weights
        run: |
          git lfs install
          git lfs pull

      - name: Restore weight files from git history
        run: |
          git show f00068a:synapse/web/lewm_weights.bin > synapse/web/lewm_weights.bin
          git show f00068a:synapse/web/neo_unify_weights.bin > synapse/web/neo_unify_weights.bin

      - name: Assemble Pages site
        run: |
          rm -rf site
          mkdir -p site/docs site/synapse-wasm-pkg
          cp synapse/web/index.html site/index.html
          cp synapse/web/lewm_weights.bin site/lewm_weights.bin
          cp synapse/web/neo_unify_weights.bin site/neo_unify_weights.bin
          cp -R synapse/docs/book/. site/docs/
          cp -R synapse/synapse-wasm/pkg/. site/synapse-wasm-pkg/
          cp -R synapse/synapse-wasm/pkg site/synapse-wasm/
          cp -R synapse/web/lewm-compress-demo site/lewm-compress-demo
          mkdir -p site/ssm-demo
          cp synapse/web/ssm-demo/index.html site/ssm-demo/
          cp synapse/web/ssm-demo/config.json site/ssm-demo/
          cp synapse/web/ssm-demo/tokenizer.json site/ssm-demo/
          if [ -d synapse/web/trajectories ]; then
            cp -R synapse/web/trajectories site/trajectories
          fi
          touch site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
