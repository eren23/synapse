version: 1
run:
  working_dir: .
  run_dir: .agent/hybrid-swarm
  poll_interval_ms: 250
  max_runtime_seconds: 60000
roles:
- role_id: orchestrator
  role_type: orchestrator
  backend: claude
  model: ''
  count: 1
  task_kinds:
  - analysis
  - design
- role_id: impl
  role_type: worker
  backend: claude
  model: ''
  count: 5
  write_access: true
  workspace_mode: shared_ro
  task_kinds:
  - implement
  - test
  - integrate
- role_id: judge
  role_type: judge
  backend: claude
  model: ''
  count: 1
  task_kinds:
  - judge
  - critic
- role_id: merger
  role_type: merger
  backend: claude
  model: ''
  count: 1
  write_access: true
  workspace_mode: shared_ro
  task_kinds:
  - merge
  - integrate
budget:
  max_cost_usd: 50.0
orchestration:
  decomposition: llm
  max_tasks: 50
  max_depth: 15
workspace:
  mode: shared
watchdog:
  task_max_duration_seconds: 1200.0
retries:
  max_task_attempts: 5
merge:
  quality_threshold: 0.75
  judge_policy: quorum
  auto_apply_non_conflicting: false
