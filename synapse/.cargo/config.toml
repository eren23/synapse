# ESP32-P4 build configuration (workspace level)
# Only applies when building for the ESP32-P4 target.
# Host builds (cargo test, cargo run) are unaffected.

[target.riscv32imafc-esp-espidf]
linker = "ldproxy"
# runner = "espflash flash --monitor"
rustflags = ["--cfg", "espidf_time64"]

[env]
MCU = "esp32p4"
ESP_IDF_VERSION = "v5.3.2"
ESP_IDF_TOOLS_INSTALL_DIR = "global"
ESP_IDF_SDKCONFIG_DEFAULTS = { value = "synapse-esp32/sdkconfig.defaults", relative = true }
